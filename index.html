<title>わが家の家計簿</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
:root{
  color-scheme:light;
  --page:#f7f6f1; --surface:#fffefa; --surface2:#f1efe8;
  --ink:#1d1c18; --ink2:#5c5a52; --ink3:#8b897f;
  --line:#e4e2d8; --hairline:rgba(29,28,24,.09);
  --accent:#0c6e51; --accent-ink:#ffffff; --accent-soft:#e3f0ea; --accent-soft-ink:#0a5a43;
  --danger:#c0392f; --danger-soft:#f9e8e5;
  --plus:#0c6e51; --minus:#c0392f;
  --chart-surface:#fcfcfb; --grid:#e1e0d9; --axis:#c3c2b7; --muted:#898781;
  --inc:#2a78d6; --exp:#e34948; --asset:#1baf7a; --asset2:#256abf;
  --shadow:0 1px 2px rgba(29,28,24,.05),0 4px 16px rgba(29,28,24,.06);
  --r:14px;
}
@media (prefers-color-scheme:dark){
  :root:where(:not([data-theme="light"])){
    color-scheme:dark;
    --page:#121210; --surface:#1c1c19; --surface2:#232320;
    --ink:#f0efe9; --ink2:#b6b4aa; --ink3:#84827a;
    --line:#31302b; --hairline:rgba(255,255,255,.09);
    --accent:#38b389; --accent-ink:#0c1f18; --accent-soft:#1d332b; --accent-soft-ink:#7ed9b9;
    --danger:#e37166; --danger-soft:#3a221f;
    --plus:#4cc79c; --minus:#e37166;
    --chart-surface:#1a1a19; --grid:#2c2c2a; --axis:#383835; --muted:#898781;
    --inc:#3987e5; --exp:#e66767; --asset:#199e70; --asset2:#5598e7;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.35);
  }
}
:root[data-theme="dark"]{
  color-scheme:dark;
  --page:#121210; --surface:#1c1c19; --surface2:#232320;
  --ink:#f0efe9; --ink2:#b6b4aa; --ink3:#84827a;
  --line:#31302b; --hairline:rgba(255,255,255,.09);
  --accent:#38b389; --accent-ink:#0c1f18; --accent-soft:#1d332b; --accent-soft-ink:#7ed9b9;
  --danger:#e37166; --danger-soft:#3a221f;
  --plus:#4cc79c; --minus:#e37166;
  --chart-surface:#1a1a19; --grid:#2c2c2a; --axis:#383835; --muted:#898781;
  --inc:#3987e5; --exp:#e66767; --asset:#199e70; --asset2:#5598e7;
  --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.35);
}
:root[data-theme="light"]{
  color-scheme:light;
  --page:#f7f6f1; --surface:#fffefa; --surface2:#f1efe8;
  --ink:#1d1c18; --ink2:#5c5a52; --ink3:#8b897f;
  --line:#e4e2d8; --hairline:rgba(29,28,24,.09);
  --accent:#0c6e51; --accent-ink:#ffffff; --accent-soft:#e3f0ea; --accent-soft-ink:#0a5a43;
  --danger:#c0392f; --danger-soft:#f9e8e5;
  --plus:#0c6e51; --minus:#c0392f;
  --chart-surface:#fcfcfb; --grid:#e1e0d9; --axis:#c3c2b7; --muted:#898781;
  --inc:#2a78d6; --exp:#e34948; --asset:#1baf7a; --asset2:#256abf;
  --shadow:0 1px 2px rgba(29,28,24,.05),0 4px 16px rgba(29,28,24,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--page); color:var(--ink);
  font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;
  font-size:15px; line-height:1.6;
  padding-bottom:76px;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
.num{font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{
  position:sticky;top:0;z-index:30;
  background:var(--surface);border-bottom:1px solid var(--line);
}
.hd-in{max-width:1080px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:16px}
.brand{font-weight:700;font-size:16px;letter-spacing:.02em;white-space:nowrap}
.brand small{display:block;font-size:10px;font-weight:600;color:var(--accent);letter-spacing:.14em}
.top-tabs{display:none;gap:4px;margin-left:auto}
.top-tabs button{
  border:0;background:none;color:var(--ink2);font-size:14px;font-weight:600;
  padding:8px 14px;border-radius:99px;
}
.top-tabs button.on{background:var(--accent-soft);color:var(--accent-soft-ink)}
@media(min-width:760px){
  body{padding-bottom:24px}
  .top-tabs{display:flex}
  .bottombar{display:none!important}
}

/* ---------- month bar ---------- */
.monthbar{max-width:1080px;margin:0 auto;padding:12px 16px 0;display:flex;align-items:center;gap:8px}
.monthbar .mv{font-size:20px;font-weight:700;letter-spacing:.02em;min-width:9em;text-align:center}
.mbtn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);font-size:16px;line-height:1;
}
.mbtn:active{background:var(--surface2)}
.monthbar input[type=month]{
  border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:6px 10px;margin-left:auto;
}

/* ---------- layout ---------- */
main{max-width:1080px;margin:0 auto;padding:14px 16px 40px;display:grid;gap:14px}
@media(min-width:900px){ .cols2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start} }
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px}
.card h2{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h2 .sp{margin-left:auto;font-weight:600;letter-spacing:0}

/* ---------- summary tiles ---------- */
.tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:760px){.tiles{grid-template-columns:repeat(4,1fr)}}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:12px 14px}
.tile .tl{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em}
.tile .tv{font-size:21px;font-weight:800;letter-spacing:.01em;margin-top:2px}
.tile .ts{font-size:11px;color:var(--ink3);margin-top:2px}
.pos{color:var(--plus)} .neg{color:var(--minus)}

/* ---------- goal ---------- */
.goalbar{height:10px;border-radius:99px;background:var(--surface2);overflow:hidden;margin:10px 0 6px}
.goalbar i{display:block;height:100%;border-radius:99px;background:var(--accent);transition:width .5s ease}
.goal-nums{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2)}
.goal-big{font-size:26px;font-weight:800}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 10px;border-radius:99px;background:var(--accent-soft);color:var(--accent-soft-ink)}
.badge.warn{background:var(--danger-soft);color:var(--minus)}

/* ---------- forms ---------- */
.frow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em}
input[type=text],input[type=number],input[type=date],input[type=month],select,textarea{
  border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 12px;min-width:0;
}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
textarea{width:100%;min-height:130px;resize:vertical;font-size:13px;line-height:1.5}
.btn{
  border:0;border-radius:12px;padding:10px 18px;font-weight:700;font-size:14px;
  background:var(--accent);color:var(--accent-ink);
}
.btn:active{filter:brightness(.92)}
.btn.ghost{background:var(--surface2);color:var(--ink)}
.btn.mini{padding:6px 12px;font-size:12px;border-radius:9px}
.btn.dangr{background:var(--danger-soft);color:var(--minus)}
.iconb{border:0;background:none;color:var(--ink3);font-size:15px;padding:4px 8px;border-radius:8px}
.iconb:hover{background:var(--surface2)}

/* income rows */
.inc-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--hairline)}
.inc-row:last-child{border-bottom:0}
.inc-name{font-weight:700;background:none;border:0;padding:0;text-align:left;font-size:15px;color:var(--ink);cursor:pointer;font-family:inherit}
.inc-name small{display:block;font-weight:600;font-size:11px;color:var(--ink3)}
.inc-name .caret{color:var(--accent);font-size:12px}
.inc-detail{background:var(--surface2);border-radius:10px;padding:10px 12px;margin:2px 0 10px}
.idrow{display:grid;grid-template-columns:1fr 110px auto;gap:6px;margin-bottom:6px}
.idrow input{padding:6px 9px;font-size:13px}
.idrow .ida{text-align:right}
.editAmt{border:0;background:none;font-weight:600;font-size:14px;color:var(--ink);cursor:pointer;padding:2px 4px;border-radius:6px;font-family:inherit}
.editAmt:hover{background:var(--surface2)}
.pin{font-size:11px}
.yen-input{position:relative}
.yen-input input{width:150px;text-align:right;font-weight:700;font-size:16px;padding-right:26px}
.yen-input::after{content:"円";position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink3)}

/* expense list */
.exp-add{display:grid;grid-template-columns:64px 1fr;gap:8px;margin-bottom:6px}
.exp-add .full{grid-column:1/-1}
.catchips{display:flex;flex-wrap:wrap;gap:6px;grid-column:1/-1}
.chip{
  border:1px solid var(--line);background:var(--surface);border-radius:99px;
  padding:5px 12px;font-size:12px;font-weight:600;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;
}
.chip .dot{width:8px;height:8px;border-radius:50%}
.chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-soft-ink)}
.grp{margin-top:10px}
.grp-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;color:var(--ink2);padding:6px 0 2px}
.grp-h .dot{width:9px;height:9px;border-radius:50%}
.grp-h .amt{margin-left:auto}
.exp-item{display:flex;align-items:center;gap:8px;padding:7px 0 7px 17px;border-top:1px solid var(--hairline);font-size:14px}
.exp-item .d{color:var(--ink3);font-size:12px;width:2.6em}
.exp-item .l{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exp-item .a{font-weight:600}
.empty{color:var(--ink3);font-size:13px;text-align:center;padding:18px 0}

/* donut */
.donut-wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center}
.legend{flex:1;min-width:220px;display:flex;flex-direction:column;gap:2px}
.leg-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0}
.leg-row .dot{width:10px;height:10px;border-radius:3px;flex:none}
.leg-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg-row .pc{color:var(--ink3);font-size:11px;width:3.4em;text-align:right}
.leg-row .am{font-weight:600}

/* assets */
.as-row{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--hairline)}
.as-row input.nm{font-size:14px;padding:7px 10px}
.as-row input.am{width:130px;text-align:right;font-weight:700;padding:7px 10px}
.typ{border:1px solid var(--line);border-radius:99px;background:var(--surface);font-size:11px;font-weight:700;padding:5px 10px;color:var(--ink2);white-space:nowrap}
.typ.inv{background:var(--accent-soft);color:var(--accent-soft-ink);border-color:transparent}
.as-sub{display:flex;justify-content:space-between;font-size:13px;color:var(--ink2);padding-top:8px}

/* import */
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.subtabs button{
  border:1px solid var(--line);background:var(--surface);border-radius:99px;
  padding:7px 14px;font-size:13px;font-weight:700;color:var(--ink2);
}
.subtabs button.on{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.hint{font-size:12.5px;color:var(--ink2);background:var(--surface2);border-radius:10px;padding:10px 12px;margin-bottom:10px;line-height:1.7}
.hint b{color:var(--ink)}
.pv-table{width:100%;border-collapse:collapse;font-size:13px}
.pv-table th{font-size:11px;color:var(--ink3);text-align:left;padding:6px 6px;border-bottom:1px solid var(--line);letter-spacing:.05em}
.pv-table td{padding:7px 6px;border-bottom:1px solid var(--hairline);vertical-align:middle}
.pv-table td.r{text-align:right;font-weight:600}
.pv-table select{padding:5px 8px;font-size:12px;border-radius:8px;max-width:110px}
.dup{opacity:.45}
.scrollx{overflow-x:auto}

/* analysis */
.rangebtns{display:flex;gap:6px;margin-bottom:8px}
.rangebtns button{border:1px solid var(--line);background:var(--surface);border-radius:9px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--ink2)}
.rangebtns button.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-soft-ink)}
.chart{background:var(--chart-surface);border:1px solid var(--hairline);border-radius:12px;padding:8px 4px 2px}
.chart svg{width:100%;height:auto;display:block}
.leg-inline{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--ink2);padding:8px 10px 4px}
.leg-inline span{display:inline-flex;align-items:center;gap:6px}
.leg-inline .dot{width:9px;height:9px;border-radius:3px}
#tooltip{
  position:fixed;z-index:99;pointer-events:none;display:none;
  background:var(--ink);color:var(--page);font-size:12px;line-height:1.5;
  padding:8px 11px;border-radius:9px;box-shadow:var(--shadow);max-width:240px;
}
.mini-table{width:100%;border-collapse:collapse;font-size:13px}
.mini-table th{font-size:11px;color:var(--ink3);text-align:right;padding:6px;border-bottom:1px solid var(--line)}
.mini-table th:first-child,.mini-table td:first-child{text-align:left}
.mini-table td{padding:6px;text-align:right;border-bottom:1px solid var(--hairline)}

/* settings */
.set-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hairline);flex-wrap:wrap}
.set-row:last-child{border-bottom:0}
.cat-dot{width:12px;height:12px;border-radius:4px;flex:none}
.note{font-size:12px;color:var(--ink3);line-height:1.7}

/* bottom nav */
.bottombar{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  background:var(--surface);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
.bottombar button{
  border:0;background:none;color:var(--ink3);font-size:10.5px;font-weight:700;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 14px;border-radius:12px;
}
.bottombar button .ic{font-size:20px;line-height:1}
.bottombar button.on{color:var(--accent)}

#toast{
  position:fixed;left:50%;bottom:88px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--page);font-size:13px;font-weight:600;
  padding:10px 20px;border-radius:99px;opacity:0;transition:.25s;z-index:90;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:760px){#toast{bottom:30px}}
details.pslip summary{cursor:pointer;font-size:12px;color:var(--ink3);font-weight:600}
details.pslip table{font-size:12px;margin-top:6px}
details.pslip td{padding:2px 10px 2px 0;color:var(--ink2)}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<header>
  <div class="hd-in">
    <div class="brand">わが家の家計簿<small>KAKEIBO</small></div>
    <nav class="top-tabs" id="topTabs"></nav>
  </div>
</header>
<div id="monthbarSlot"></div>
<main id="view"></main>
<nav class="bottombar" id="bottomBar"></nav>
<div id="tooltip" role="status"></div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================
   わが家の家計簿 — single-file app (localStorage persistence)
============================================================ */
const LS_KEY = "kakeibo-v1";
const $ = (s, el) => (el || document).querySelector(s);
const $$ = (s, el) => Array.from((el || document).querySelectorAll(s));
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const yen = n => "¥" + Math.round(Number(n) || 0).toLocaleString("ja-JP");
const yenS = n => (n < 0 ? "−¥" + Math.abs(Math.round(n)).toLocaleString("ja-JP") : yen(n));
const numVal = v => { const n = Number(String(v ?? "").replace(/[,，\s円¥￥]/g, "")); return isNaN(n) ? 0 : n; };
const fmtIn = n => { const x = Number(n); return !x ? "" : x.toLocaleString("ja-JP"); };
const uid = () => Math.random().toString(36).slice(2, 10);
const todayYM = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); };
const ymLabel = ym => { const [y, m] = ym.split("-"); return y + "年" + Number(m) + "月"; };
const ymShort = ym => { const [y, m] = ym.split("-"); return (Number(m) === 1 || ym === state.rangeStart ? String(Number(y) % 100) + "'" : "") + Number(m) + "月"; };
const addMonths = (ym, n) => { const [y, m] = ym.split("-").map(Number); const d = new Date(y, m - 1 + n, 1); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); };
const cmpYM = (a, b) => a < b ? -1 : a > b ? 1 : 0;

/* ---------- default categories ---------- */
const DEFAULT_CATS = [
  { id: "food",    name: "食費",       color: "#2a78d6" },
  { id: "loan",    name: "住宅ローン", color: "#4a3aa7" },
  { id: "util",    name: "光熱費",     color: "#eda100" },
  { id: "water",   name: "水道",       color: "#6da7ec" },
  { id: "comm",    name: "通信費",     color: "#1baf7a" },
  { id: "schol",   name: "奨学金返済", color: "#184f95" },
  { id: "gas",     name: "ガソリン",   color: "#eb6834" },
  { id: "daily",   name: "日用品",     color: "#008300" },
  { id: "subsc",   name: "サブスク",   color: "#e87ba4" },
  { id: "fun",     name: "娯楽",       color: "#e34948" },
  { id: "insur",   name: "保険",       color: "#256abf" },
  { id: "kids",    name: "子育て",     color: "#d55181" },
  { id: "med",     name: "医療・健康", color: "#199e70" },
  { id: "social",  name: "交際費",     color: "#c98500" },
  { id: "special", name: "特別支出",   color: "#9085e9" },
  { id: "legacy",  name: "過去データ", color: "#a8a69e" },
  { id: "other",   name: "その他",     color: "#898781" }
];

/* ---------- built-in categorization keywords ---------- */
const KW = [
  ["food",  ["スーパー","マルエツ","イオン","西友","セイユー","ヨーク","ベイシア","ヤオコー","カスミ","ライフ","オーケー","業務スーパー","セブン-イレブン","セブンイレブン","セブン","ローソン","ファミリーマート","ファミマ","ミニストップ","マクドナルド","モス","吉野家","すき家","松屋","ガスト","サイゼリヤ","くら寿司","スシロー","はま寿司","丸亀","ケンタッキー","スターバックス","スタバ","ドトール","タリーズ","コメダ","パン","ベーカリー","弁当","UBER EATS","ウーバーイーツ","出前館","食品"]],
  ["gas",   ["ENEOS","エネオス","出光","IDEMITSU","コスモ石油","コスモセキユ","シェル","SHELL","APOLLO","アポロ","宇佐美","キグナス","SS","ガソリン"]],
  ["daily", ["ウエルシア","マツモトキヨシ","マツキヨ","ツルハ","スギ薬局","サンドラッグ","ココカラ","クリエイト","ドラッグ","カインズ","コーナン","ビバホーム","DCM","ダイソー","セリア","キャンドゥ","ニトリ","無印良品","ホームセンター","薬局"]],
  ["subsc", ["NETFLIX","ネットフリックス","HULU","SPOTIFY","APPLE MUSIC","YOUTUBE","AMAZON PRIME","AMAZONプライム","ICLOUD","DAZN","U-NEXT","ABEMA","ダウンタウン","DISNEY","アドビ","ADOBE","GOOGLE ONE","OPENAI","CLAUDE","ジム","会費"]],
  ["comm",  ["楽天モバイル","ラクテンモバイル","DOCOMO","ドコモ","SOFTBANK","ソフトバンク","AU ","KDDI","ワイモバイル","UQ","NTT","OCN","ビッグローブ","BIGLOBE","インターネット","WI-FI","WIFI"]],

const OLD_GMAIL_QUERIES = [
  "(from:rakuten-card.co.jp OR from:rakuten.co.jp) (ご利用のお知らせ OR ご利用内容確認 OR カード利用)",
  "from:(rakuten-card.co.jp OR pay.rakuten.co.jp OR rakuten.co.jp)"
];
/* 楽天ペイの決済通知メールの送信元のみ。rakuten.co.jp全体にすると広告メルマガが混ざるので不可。
   楽天カードの利用分はe-NAVIのCSV取込を使う運用のため、カード速報メールもあえて含めない（二重計上防止） */
const DEFAULT_GMAIL_QUERY = "from:(pay.rakuten.co.jp OR checkout.rakuten.co.jp)";
const DEFAULT_GEMINI_MODEL = "gemini-2.5-flash";
/* gemini-2.0-flash等の旧モデルはGoogle側で廃止済み（無料枠0でエラーになる）ため自動で置き換える */
const DEPRECATED_GEMINI_MODELS = ["gemini-2.0-flash", "gemini-2.0-flash-001", "gemini-1.5-flash", "gemini-1.5-flash-001", "gemini-1.5-pro", "gemini-1.5-pro-001", "gemini-1.0-pro"];
const inArtifact = !!(window.claude && (window.claude.downloads || window.claude.mcp));

/* ---------- blank starting state ---------- */
function seedData() {
  return {
    version: 1,
    settings: {
      husbandName: "夫", wifeName: "妻",
      categories: DEFAULT_CATS.map(c => ({ ...c })),
      goal: { amount: 0, deadline: "" },
      rules: [],
      geminiKey: "", geminiModel: DEFAULT_GEMINI_MODEL,
      googleClientId: "", gmailQuery: DEFAULT_GMAIL_QUERY, gmailLastSync: null
    },
    months: {}
  };
}

/* ---------- store ---------- */
let DB;
function load() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) { DB = JSON.parse(raw); migrate(); return; }
  } catch (e) {}
  DB = seedData();
  save();
}
function migrate() {
  const s = DB.settings || {};
  // 旧Gmail検索条件（キーワードでヒットしない／広告が混ざる）を新形式に置き換え
  if (!s.gmailQuery || OLD_GMAIL_QUERIES.includes(s.gmailQuery)) { s.gmailQuery = DEFAULT_GMAIL_QUERY; save(); }
  // 廃止されたGeminiモデル名（無料枠0でエラーになる）を現行モデルに置き換え
  if (s.geminiModel && DEPRECATED_GEMINI_MODELS.includes(s.geminiModel)) { s.geminiModel = DEFAULT_GEMINI_MODEL; save(); }
}
function save() {
  DB.updatedAt = Date.now();
  try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
  catch (e) { toast("保存に失敗しました（容量不足の可能性）"); }
  if (typeof pushToCloud === "function") pushToCloud();
}
function monthOf(ym, create) {
  if (!DB.months[ym] && create) DB.months[ym] = { income: { ken: 0, misuzu: 0 }, expenses: [], assets: null };
  return DB.months[ym];
}
function catById(id) { return DB.settings.categories.find(c => c.id === id) || DB.settings.categories.find(c => c.id === "other") || { id: "other", name: "その他", color: "#898781" }; }
function sortedYMs() { return Object.keys(DB.months).sort(); }
function latestAssets(uptoYM) {
  const yms = sortedYMs().filter(ym => cmpYM(ym, uptoYM) <= 0).reverse();
  for (const ym of yms) {
    const m = DB.months[ym];
    if (m.assets && m.assets.length) return { ym, assets: m.assets };
  }
  return null;
}
function totals(ym) {
  const m = DB.months[ym];
  if (!m) return { inc: 0, exp: 0, bal: 0 };
  const inc = (m.income.ken || 0) + (m.income.misuzu || 0) + (m.income.other || 0);
  const exp = m.expenses.reduce((s, e) => s + (e.amount || 0), 0);
  return { inc, exp, bal: inc - exp };
}
function assetTotal(list) { return (list || []).reduce((s, a) => s + (a.amount || 0), 0); }

/* ---------- recurring fixed expenses (毎月の固定費) ---------- */
function recTemplates() { return DB.settings.recurring = DB.settings.recurring || []; }
function ensureRecurring(ym, m) {
  let changed = false;
  m.skipRec = m.skipRec || [];
  recTemplates().forEach(t => {
    if (t.since && cmpYM(ym, t.since) < 0) return;
    if (m.skipRec.includes(t.id)) return;
    if (m.expenses.some(e => e.recurringId === t.id)) return;
    m.expenses.push({ id: uid(), day: t.day || 27, label: t.label, amount: t.amount, cat: t.cat, recurringId: t.id });
    changed = true;
  });
  if (changed) save();
}

/* ============================================================ HOME ============================================================ */
function renderHome() {
  const ym = state.cur;
  const m = monthOf(ym, true);
  // materialize assets by carrying forward
  let carried = false;
  if (!m.assets) {
    const prev = latestAssets(addMonths(ym, -1));
    if (prev) { m.assets = prev.assets.map(a => ({ ...a, id: uid() })); carried = true; save(); }
    else m.assets = [];
  }
  ensureRecurring(ym, m);
  // 楽天キャッシュ残高の口座を一度だけ自動追加（今月以降を開いたとき）
  DB.migrations = DB.migrations || {};
  if (!DB.migrations.rakutenCash && cmpYM(ym, todayYM()) >= 0) {
    if (!m.assets.some(a => (a.name || "").includes("楽天キャッシュ"))) {
      m.assets.push({ id: uid(), name: "楽天キャッシュ残高（" + (DB.settings.husbandName || "夫") + "）", type: "cash", amount: 0 });
      m.assets.push({ id: uid(), name: "楽天キャッシュ残高（" + (DB.settings.wifeName || "妻") + "）", type: "cash", amount: 0 });
    }
    DB.migrations.rakutenCash = true;
    save();
  }
  const { inc, exp, bal } = totals(ym);
  const aTotal = assetTotal(m.assets);
  const cash = assetTotal(m.assets.filter(a => a.type !== "invest"));
  const inv = assetTotal(m.assets.filter(a => a.type === "invest"));
  const g = DB.settings.goal || {};
  const gap = (g.amount || 0) - aTotal;
  const pct = g.amount ? Math.max(0, Math.min(100, aTotal / g.amount * 100)) : 0;

  // goal pacing
  let paceHtml = "";
  if (g.deadline) {
    const [gy, gm] = g.deadline.split("-").map(Number);
    const [cy, cm] = ym.split("-").map(Number);
    const monthsLeft = (gy - cy) * 12 + (gm - cm);
    if (gap <= 0) paceHtml = `<span class="badge">🎉 目標達成！</span>`;
    else if (monthsLeft > 0) paceHtml = `<span class="badge">期限まで${monthsLeft}ヶ月 ・ 月${yen(Math.ceil(gap / monthsLeft))}ペース</span>`;
    else paceHtml = `<span class="badge warn">期限（${g.deadline}）を過ぎています — 設定から新しい目標を</span>`;
  }

  const hName = esc(DB.settings.husbandName || "夫"), wName = esc(DB.settings.wifeName || "妻");

  // expenses grouped by category
  const byCat = {};

    .map(([cid, list]) => ({ cat: catById(cid), list, sum: list.reduce((s, e) => s + e.amount, 0) }))
    .sort((a, b) => b.sum - a.sum);

  const catChips = DB.settings.categories.filter(c => c.id !== "legacy").map(c =>
    `<button type="button" class="chip" data-cat="${c.id}"><span class="dot" style="background:${c.color}"></span>${esc(c.name)}</button>`).join("");

  $("#view").innerHTML = `
  <div class="tiles">
    <div class="tile"><div class="tl">総収入</div><div class="tv num pos">${yen(inc)}</div><div class="ts">${hName} ${yen(m.income.ken)} ／ ${wName} ${yen(m.income.misuzu)}</div></div>
    <div class="tile"><div class="tl">総支出</div><div class="tv num" style="color:var(--minus)">${yen(exp)}</div><div class="ts">${m.expenses.length}件</div></div>
    <div class="tile"><div class="tl">残金（収入−支出）</div><div class="tv num ${bal >= 0 ? "pos" : "neg"}">${yenS(bal)}</div><div class="ts">${ymLabel(ym)}</div></div>
    <div class="tile"><div class="tl">資産合計</div><div class="tv num">${yen(aTotal)}</div><div class="ts">貯金 ${yen(cash)} ＋ 投資 ${yen(inv)}</div></div>
  </div>

  <div class="card">
    <h2>🎯 目標まで <span class="sp">${g.amount ? "目標 " + yen(g.amount) + (g.deadline ? "（" + g.deadline.replaceAll("-", "/") + "まで）" : "") : ""}</span></h2>
    ${g.amount ? `
      <div class="goal-big num ${gap <= 0 ? "pos" : ""}">${gap <= 0 ? "達成 +" + yen(-gap) : "あと " + yen(gap)}</div>
      <div class="goalbar"><i style="width:${pct}%"></i></div>
      <div class="goal-nums num"><span>現在 ${yen(aTotal)}（${Math.round(pct)}%）</span><span>${yen(g.amount)}</span></div>
      <div style="margin-top:8px">${paceHtml}</div>

        <div class="yen-input"><input type="text" inputmode="numeric" id="incKen" value="${fmtIn(m.income.ken)}" placeholder="0"></div>
      </div>
      ${incDetailEditor(m, "ken")}

        <button type="button" class="inc-name incToggle" data-who="misuzu">${wName} <span class="caret">${state.incOpen.misuzu ? "▾" : "▸"}</span><small>${(m.income.misuzuItems || []).length ? "明細 " + m.income.misuzuItems.length + "項目 — タップで開く" : "タップで明細内訳を入力"}</small></button>
        <div class="yen-input"><input type="text" inputmode="numeric" id="incMis" value="${fmtIn(m.income.misuzu)}" placeholder="0"></div>
      </div>
      ${incDetailEditor(m, "misuzu")}
      <div class="inc-row">
        <div class="inc-name" style="cursor:default">その他<small>児童手当・臨時収入など</small></div>
        <div class="yen-input"><input type="text" inputmode="numeric" id="incOther" value="${fmtIn(m.income.other)}" placeholder="0"></div>
      </div>
      <div style="margin-top:10px"><button class="btn mini ghost" id="goPayslip">📷 給与明細を読み取る</button></div>

    <div class="card">

          <div class="yen-input"><input class="am num" type="text" inputmode="numeric" value="${fmtIn(a.amount)}" placeholder="0"></div>
          <button type="button" class="iconb del" aria-label="削除">✕</button>

      </div>
      <div style="margin-top:8px"><button class="btn mini ghost" id="addAsset">＋ 口座を追加</button></div>
      <div class="as-sub num"><span>貯金 <b>${yen(cash)}</b> ／ 投資 <b>${yen(inv)}</b></span><span>合計 <b>${yen(aTotal)}</b></span></div>
    </div>
  </div>

  <div class="card">
    <h2>🧾 支出 <span class="sp num" style="color:var(--minus)">${yen(exp)}</span></h2>
    <form id="expForm" class="exp-add">
      <div class="field"><label>日</label><input type="number" id="eDay" min="1" max="31" value="${cmpYM(ym, todayYM()) === 0 ? new Date().getDate() : 1}"></div>
      <div class="field"><label>内容</label><input type="text" id="eLabel" placeholder="例：スーパーで買い物"></div>
      <div class="field full"><label>金額（円）</label><input type="text" inputmode="numeric" id="eAmt" class="num" placeholder="例：1,280"></div>
      <div class="catchips" id="eCats">${catChips}</div>
      <label class="full" style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer"><input type="checkbox" id="eFixed">📌 毎月の固定費として登録（来月以降も自動で追加されます）</label>
      <div class="full"><button class="btn" type="submit" style="width:100%">支出を追加</button></div>
    </form>
    ${donutHtml(catGroups, exp)}
    <div id="expList">
      ${catGroups.length ? catGroups.map(g2 => `
        <div class="grp">
          <div class="grp-h"><span class="dot" style="background:${g2.cat.color}"></span>${esc(g2.cat.name)}<span class="amt num">${yen(g2.sum)}</span></div>
          ${g2.list.sort((a, b) => a.day - b.day).map(e => `
            <div class="exp-item" data-id="${e.id}">
              <span class="d num">${e.day}日</span><span class="l">${e.recurringId ? '<span class="pin" title="毎月の固定費">📌</span> ' : ""}${esc(e.label)}</span>
              <button type="button" class="editAmt num" title="タップで金額を変更">${yen(e.amount)}</button>
              <button type="button" class="iconb delExp" aria-label="削除">✕</button>

        </div>`).join("") : '<div class="empty">まだ支出がありません。上のフォームか「取込」タブから追加できます。</div>'}
    </div>
    ${recTemplates().length ? `
    <details style="margin-top:14px">
      <summary style="cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink2)">📌 固定費の管理（${recTemplates().length}件）</summary>

        <div class="set-row" data-id="${t.id}">
          <span class="cat-dot" style="background:${catById(t.cat).color}"></span>
          <span style="flex:1;font-size:13px">${esc(t.label)}<span class="note">（毎月${t.day || 27}日・${esc(catById(t.cat).name)}）</span></span>
          <button type="button" class="editAmt num recAmt" title="来月以降の金額を変更">${yen(t.amount)}</button>
          <button type="button" class="iconb recDel" aria-label="削除">✕</button>

    $(id).onchange = e => { m.income[key] = numVal(e.target.value); save(); renderHome(); };

  /* wire income detail editors */
  $$(".incToggle").forEach(b => b.onclick = () => { const w = b.dataset.who; state.incOpen[w] = !state.incOpen[w]; renderHome(); });
  $$(".inc-detail").forEach(box => {
    const who = box.dataset.who;
    const items = m.income[who + "Items"] = m.income[who + "Items"] || [];

      const it = items[Number(row.dataset.i)];
      $(".idl", row).onchange = e => { it.label = e.target.value; save(); };
      $(".ida", row).onchange = e => { it.amount = numVal(e.target.value); save(); renderHome(); };
      $(".idDel", row).onclick = () => { items.splice(Number(row.dataset.i), 1); save(); renderHome(); };
    });
    $(".idAdd", box).onclick = () => { items.push({ label: "", amount: 0 }); save(); renderHome(); };
    $(".idCopy", box).onclick = () => {
      let p = ym, found = null;
      for (let i = 0; i < 36 && !found; i++) {
        p = addMonths(p, -1);
        const pm = DB.months[p];
        if (pm && pm.income[who + "Items"] && pm.income[who + "Items"].length) found = pm.income[who + "Items"];
      }
      if (!found) { toast("コピーできる過去の明細がありません"); return; }
      m.income[who + "Items"] = found.map(x => ({ ...x }));
      save(); renderHome(); toast("前回の内訳をコピーしました");
    };
  });

  /* wire assets */
  $$("#assetRows .as-row").forEach(row => {
    const a = m.assets.find(x => x.id === row.dataset.id);

    row.querySelector(".am").onchange = e => { a.amount = numVal(e.target.value); save(); renderHome(); };

    e.preventDefault();
    const amt = numVal($("#eAmt").value);

    if (!amt) { toast("金額を入力してください"); return; }
    const day = Math.min(31, Math.max(1, Number($("#eDay").value) || 1));
    const cat = selCat || guessCat(label) || "other";
    const entry = { id: uid(), day, label: label || catById(cat).name, amount: amt, cat };
    if ($("#eFixed").checked) {
      const t = { id: uid(), label: entry.label, amount: amt, cat, day, since: ym };
      recTemplates().push(t);
      entry.recurringId = t.id;
      toast("固定費として登録しました（来月以降も自動で追加されます）");
    } else {
      toast("支出を追加しました");
    }
    m.expenses.push(entry);
    save(); renderHome();
  };
  $$("#expList .editAmt").forEach(b => b.onclick = () => {
    const id = b.closest(".exp-item").dataset.id;
    const e = m.expenses.find(x => x.id === id);
    const v = prompt(`「${e.label}」の金額（今月分）`, e.amount);
    if (v == null) return;
    const n = numVal(v);
    if (!n) { toast("金額を確認してください"); return; }
    e.amount = n; save(); renderHome();
  });
  $$("#expList .delExp").forEach(b => b.onclick = () => {
    const id = b.closest(".exp-item").dataset.id;
    const e = m.expenses.find(x => x.id === id);
    if (e.recurringId) {
      if (!confirm(`「${e.label}」は毎月の固定費です。今月の分だけ削除しますか？\n（来月以降は引き続き自動追加されます。完全に止めるには「固定費の管理」から削除してください）`)) return;

/* donut chart for current month */
function donutHtml(groups, total) {
  if (!total) return "";
  const top = groups.slice(0, 8);
  const rest = groups.slice(8);
  const wedges = top.map(g => ({ name: g.cat.name, color: g.cat.color, v: g.sum }));
  if (rest.length) wedges.push({ name: "その他", color: "#898781", v: rest.reduce((s, g) => s + g.sum, 0) });
  const R = 62, r = 40, cx = 75, cy = 75;
  let a0 = -Math.PI / 2, paths = "";
  wedges.forEach(w => {
    const frac = w.v / total;
    let a1 = a0 + frac * Math.PI * 2;
    const gapA = Math.min(0.03, (a1 - a0) * 0.15); // ~2px spacer
    const s = a0 + gapA / 2, e2 = a1 - gapA / 2;
    if (e2 > s) {
      const large = (e2 - s) > Math.PI ? 1 : 0;
      const p = (ang, rad) => (cx + rad * Math.cos(ang)).toFixed(2) + " " + (cy + rad * Math.sin(ang)).toFixed(2);
      paths += `<path d="M ${p(s, R)} A ${R} ${R} 0 ${large} 1 ${p(e2, R)} L ${p(e2, r)} A ${r} ${r} 0 ${large} 0 ${p(s, r)} Z" fill="${w.color}"><title>${esc(w.name)} ${yen(w.v)}</title></path>`;
    }
    a0 = a1;
  });
  return `<div class="donut-wrap" style="margin:16px 0 6px">
    <svg viewBox="0 0 150 150" width="150" height="150" role="img" aria-label="カテゴリ別支出の内訳">
      ${paths}
      <text x="75" y="70" text-anchor="middle" style="font-size:10px;fill:var(--muted)">支出合計</text>
      <text x="75" y="86" text-anchor="middle" style="font-size:13px;font-weight:700;fill:var(--ink)" class="num">${yen(total)}</text>
    </svg>
    <div class="legend">${wedges.map(w => `<div class="leg-row"><span class="dot" style="background:${w.color}"></span><span class="nm">${esc(w.name)}</span><span class="pc num">${(w.v / total * 100).toFixed(0)}%</span><span class="am num">${yen(w.v)}</span></div>`).join("")}</div>
  </div>`;
}

/* ---------- categorize ---------- */
const norm = s => String(s || "").normalize("NFKC").toUpperCase();
function guessCat(label) {
  if (!label) return null;
  const L = norm(label);
  for (const r of (DB.settings.rules || [])) {
    if (r.kw && L.includes(norm(r.kw))) return r.cat;
  }
  for (const [cat, words] of KW) {
    for (const w of words) if (L.includes(norm(w))) return cat;
  }
  return null;
}

function b64urlToText(b64url) {
  const b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
  const bin = atob(b64);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}
function stripHtml(html) {
  return html.replace(/<style[\s\S]*?<\/style>/gi, "").replace(/<script[\s\S]*?<\/script>/gi, "")
    .replace(/<br\s*\/?>/gi, "\n").replace(/<\/(p|div|tr|td|li|h\d)>/gi, "\n").replace(/<[^>]+>/g, " ")
    .replace(/&nbsp;/gi, " ").replace(/&yen;/gi, "¥").replace(/&amp;/gi, "&").replace(/&lt;/gi, "<").replace(/&gt;/gi, ">").replace(/&quot;/gi, '"')
    .replace(/&#x([0-9a-f]+);/gi, (_, n) => String.fromCodePoint(parseInt(n, 16)))
    .replace(/&#(\d+);/g, (_, n) => String.fromCodePoint(Number(n)))
    .replace(/[ \t]+/g, " ").replace(/\n{2,}/g, "\n").trim();
}
function extractBodies(payload) {
  const walk = (part, wantType) => {
    if (!part) return null;
    if (part.mimeType === wantType && part.body && part.body.data) return b64urlToText(part.body.data);
    if (part.parts) { for (const p of part.parts) { const r = walk(p, wantType); if (r) return r; } }
    return null;
  };
  const plain = payload ? walk(payload, "text/plain") : null;
  const htmlRaw = payload ? walk(payload, "text/html") : null;
  let fallback = "";
  if (!plain && !htmlRaw && payload && payload.body && payload.body.data) fallback = b64urlToText(payload.body.data);
  return { plain: plain || fallback || "", html: htmlRaw ? stripHtml(htmlRaw) : "" };
}
async function gmailApi(path, params) {
  const url = new URL("https://gmail.googleapis.com/gmail/v1/users/me/" + path);
  Object.entries(params || {}).forEach(([k, v]) => { if (v != null) url.searchParams.set(k, v); });
  const res = await fetch(url, { headers: { Authorization: "Bearer " + gmailToken.access_token } });
  if (!res.ok) {
    if (res.status === 401) { gmailToken = null; throw new Error("認証の有効期限が切れました。もう一度接続してください"); }
    throw new Error("Gmail APIエラー（" + res.status + "）");
  }
  return res.json();
}
async function fetchGmailAndParse(query, onProgress) {
  const list = await gmailApi("messages", { q: query, maxResults: 100 });
  const ids = (list.messages || []).map(m => m.id);
  if (!ids.length) return [];
  let done = 0;
  const bodies = [];
  const batchSize = 6;
  for (let i = 0; i < ids.length; i += batchSize) {
    const batch = ids.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(id => gmailApi("messages/" + id, { format: "full" }).catch(() => null)));
    results.forEach(msg => { if (msg) bodies.push(extractBodies(msg.payload)); done++; });
    if (onProgress) onProgress(done, ids.length);
  }
  /* 解析デバッグ用に先頭3通の抽出テキストを保持 */
  state.gmailDebug = bodies.slice(0, 3).map(b => ({
    plain: (b.plain || "").slice(0, 4000),
    html: (b.html || "").slice(0, 4000)
  }));
  /* 全メールのプレーンテキスト版とHTML版を両方解析して統合。
     同じ取引（同じ日付・金額）の二重通知はひとつにまとめ、店名が取れている行を優先する */
  const byKey = new Map();
  bodies.forEach(b => {
    const parsed = [
      ...(b.plain ? parseRakutenMail(b.plain) : []),
      ...(b.html ? parseRakutenMail(b.html) : [])
    ];
    parsed.forEach(r => {
      const k = r.ym + "|" + r.day + "|" + r.amount;
      const list = byKey.get(k);
      if (!list) { byKey.set(k, [r]); return; }
      if (MAIL_FALLBACK_LABELS.includes(r.label)) return;
      const iFall = list.findIndex(x => MAIL_FALLBACK_LABELS.includes(x.label));
      if (iFall >= 0) { list[iFall] = r; return; }
      if (!list.some(x => x.label === r.label)) list.push(r);
    });
  });
  const rows = [];
  byKey.forEach(list => rows.push(...list));
  rows.sort((a, b) => a.ym === b.ym ? a.day - b.day : cmpYM(a.ym, b.ym));
  return rows;
}

function fileToBase64(file) {

}
async function callGeminiOCR(images) {
  /* images: [{base64, mimeType}, ...] — 1枚でも複数枚（裏表など）でもOK */
  const key = (DB.settings.geminiKey || "").trim();
  if (!key) { const e = new Error("Gemini APIキーが未設定です"); e.noKey = true; throw e; }
  const model = DB.settings.geminiModel || DEFAULT_GEMINI_MODEL;
  const prompt = images.length > 1
    ? `これらは同じ人の日本の給与明細に関する複数枚の写真です（裏表や、明細書＋振込通知票など、関連する複数の書類の場合があります）。すべての写真の内容を1つにまとめ、記載されている項目をすべて読み取って、次のJSON形式だけで出力してください。前置きや説明文、コードブロックの記号は不要です。
{"items":[{"label":"項目名","amount":数値}],"gross":支給額計または総支給額(数値かnull),"deduction":控除合計(すべての控除・天引き項目の合計。複数の書類にまたがる場合は合算する。数値かnull),"net":最終的に実際に口座へ振り込まれた金額(数値かnull)}
金額はカンマや円記号を除いた数値にしてください。同じ項目が複数の写真に重複して写っていても1回だけ数えてください。読み取れない項目は無理に含めないでください。"net"は、複数の書類にまたがって控除がある場合、最終的な実際の振込額（本人口座振込額など、一番最後に確定する金額）を優先してください。`
    : `これは日本の給与明細の写真です。記載されている項目をすべて読み取り、次のJSON形式だけで出力してください。前置きや説明文、コードブロックの記号は不要です。
{"items":[{"label":"項目名","amount":数値}],"gross":支給額計または総支給額(数値かnull),"deduction":控除合計(数値かnull),"net":差引支給額または振込額(数値かnull)}
金額はカンマや円記号を除いた数値にしてください。読み取れない項目は無理に含めないでください。`;
  let res;
  try {
    res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }, ...images.map(img => ({ inline_data: { mime_type: img.mimeType, data: img.base64 } }))] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0 }
      })
    });
  } catch (err) {
    const e = new Error("通信できませんでした。GitHub Pagesで公開したURLから開いているか確認してください。"); throw e;
  }
  if (!res.ok) {
    const body = await res.json().catch(() => null);
    const raw = (body && body.error && body.error.message) || ("Gemini APIエラー（" + res.status + "）");
    console.error("Gemini API error:", raw);
    if (res.status === 429 || /quota|RESOURCE_EXHAUSTED/i.test(raw)) {
      throw new Error(`このAPIキーは「${model}」モデルの無料枠が0に設定されているようです。Google AI Studio（aistudio.google.com/apikey）でキーの発行し直し、または設定画面の詳細設定でモデル名を変更してお試しください。`);
    }
    throw new Error(raw);
  }
  const data = await res.json();
  const text = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
  if (!text) throw new Error("読み取り結果が空でした");
  try { return JSON.parse(text); } catch (e) { throw new Error("読み取り結果を解析できませんでした"); }
}

/* ============================================================ 夫婦間リアルタイム同期（Firebase） ============================================================ */
const FB_CONFIG_KEY = "kakeibo-firebase-config";
const FB_SDK_VER = "10.14.1";
let fbMods = null, fbApp = null, fbAuth = null, fbDb = null, fbUser = null, fbUnsub = null;
let fbSyncing = false, fbPushTimer = null, fbInitPromise = null;

function loadFirebaseConfig() {
  try { const raw = localStorage.getItem(FB_CONFIG_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
}
function saveFirebaseConfig(cfg) { localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg)); }
function parseFirebaseConfigText(text) {
  const obj = {};
  const re = /["']?(\w+)["']?\s*:\s*["']([^"']*)["']/g;
  let m;
  while ((m = re.exec(text))) obj[m[1]] = m[2];
  return (obj.apiKey && obj.projectId) ? obj : null;
}
async function loadFirebaseSDK() {
  if (fbMods) return fbMods;
  const base = `https://www.gstatic.com/firebasejs/${FB_SDK_VER}/`;
  const [appMod, authMod, fsMod] = await Promise.all([
    import(/* @vite-ignore */ base + "firebase-app.js"),
    import(/* @vite-ignore */ base + "firebase-auth.js"),
    import(/* @vite-ignore */ base + "firebase-firestore.js")
  ]);
  fbMods = { appMod, authMod, fsMod };
  return fbMods;
}
function fbInit() {
  if (fbInitPromise) return fbInitPromise;
  fbInitPromise = (async () => {
    const cfg = loadFirebaseConfig();
    if (!cfg) return false;
    try {
      const { appMod, authMod, fsMod } = await loadFirebaseSDK();
      fbApp = appMod.initializeApp(cfg);
      fbAuth = authMod.getAuth(fbApp);
      fbDb = fsMod.getFirestore(fbApp);
      authMod.onAuthStateChanged(fbAuth, user => {
        fbUser = user;
        if (user) startFbSync(); else stopFbSync();
        if (state.view === "settings") renderSettings();
      });
      return true;
    } catch (e) {
      console.error("Firebase init failed:", e);
      fbInitPromise = null;
      return false;
    }
  })();
  return fbInitPromise;
}
async function fbSignIn() {
  const ok = await fbInit();
  if (!ok) { toast("Firebase設定を保存してから同期を開始してください"); return; }
  try {
    const provider = new fbMods.authMod.GoogleAuthProvider();
    await fbMods.authMod.signInWithPopup(fbAuth, provider);
  } catch (e) {
    toast("ログインに失敗しました：" + ((e && e.message) || ""));
  }
}
function fbSignOut() { if (fbAuth && fbMods) fbMods.authMod.signOut(fbAuth); stopFbSync(); }
function startFbSync() {
  if (fbSyncing || !fbDb || !fbUser) return;
  fbSyncing = true;
  const { fsMod } = fbMods;
  const ref = fsMod.doc(fbDb, "families", "main");
  fsMod.getDoc(ref).then(snap => {
    const remote = snap.exists() ? snap.data() : null;
    const localUpdated = DB.updatedAt || 0;
    const remoteUpdated = (remote && remote.updatedAt) || 0;
    if (remote && remoteUpdated >= localUpdated) applyRemoteDB(remote);
    else pushToCloud(true);
    fbUnsub = fsMod.onSnapshot(ref, snap2 => {
      if (!snap2.exists()) return;
      const data = snap2.data();
      if ((data.updatedAt || 0) > (DB.updatedAt || 0)) applyRemoteDB(data);
    });
  }).catch(e => { console.error("Firestore sync start failed:", e); toast("同期の開始に失敗しました（Firestoreの設定・ルールを確認してください）"); fbSyncing = false; });
}
function stopFbSync() { if (fbUnsub) { fbUnsub(); fbUnsub = null; } fbSyncing = false; }
function applyRemoteDB(data) {
  const { updatedAt, ...rest } = data;
  DB = rest;
  DB.updatedAt = updatedAt;
  try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); } catch (e) {}
  render();
}
function pushToCloud(immediate) {
  if (!fbUser || !fbDb || !fbMods) return;
  clearTimeout(fbPushTimer);
  const doPush = () => { fbMods.fsMod.setDoc(fbMods.fsMod.doc(fbDb, "families", "main"), DB).catch(e => console.error("sync push failed:", e)); };
  if (immediate) doPush(); else fbPushTimer = setTimeout(doPush, 800);
}

/* ---------- CSV parser (楽天カード e-NAVI ほか) ---------- */
function parseCSVLine(line) {
  const out = []; let cur = "", inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQ) {
      if (ch === '"') { if (line[i + 1] === '"') { cur += '"'; i++; } else inQ = false; }
      else cur += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === "," || ch === "\t") { out.push(cur); cur = ""; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out;
}
function parseDateStr(s) {
  const m = String(s).match(/(20\d{2})[\/\-年\.](\d{1,2})[\/\-月\.](\d{1,2})/);
  if (!m) return null;
  return { ym: m[1] + "-" + String(Number(m[2])).padStart(2, "0"), day: Number(m[3]) };
}
function parseCSVText(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (!lines.length) return [];
  let header = null, hIdx = -1;
  for (let i = 0; i < Math.min(lines.length, 5); i++) {
    const cols = parseCSVLine(lines[i]);
    if (cols.some(c => /利用日|ご利用日/.test(c)) && cols.some(c => /金額|総額/.test(c))) { header = cols; hIdx = i; break; }
  }
  const rows = [];
  if (header) {
    const iDate = header.findIndex(c => /利用日|ご利用日/.test(c));
    const iName = header.findIndex(c => /店名|利用店|商品名|利用先|内容/.test(c));
    let iAmt = header.findIndex(c => /利用金額|ご利用金額/.test(c));
    if (iAmt < 0) iAmt = header.findIndex(c => /支払総額|金額/.test(c));
    for (let i = hIdx + 1; i < lines.length; i++) {
      const c = parseCSVLine(lines[i]);
      const d = parseDateStr(c[iDate]);
      const amt = Number(String(c[iAmt] || "").replace(/[¥￥,\s円]/g, ""));
      if (!d || !amt || amt <= 0) continue;
      rows.push({ ym: d.ym, day: d.day, label: (c[iName] || "").trim() || "カード利用", amount: amt });
    }
  } else {
    // free-form lines: date ... amount
    for (const line of lines) {
      const d = parseDateStr(line);
      if (!d) continue;
      const nums = line.replace(/(20\d{2})[\/\-年\.]\d{1,2}[\/\-月\.]\d{1,2}日?/, "").match(/[¥￥]?\s?([\d,]{2,})\s?円?/g);
      if (!nums) continue;
      const amt = Number(nums[0].replace(/[¥￥,\s円]/g, ""));
      if (!amt) continue;
      let label = line.replace(/(20\d{2})[\/\-年\.]\d{1,2}[\/\-月\.]\d{1,2}日?/, "").replace(nums[0], "");
      label = label.replace(/[,\t]+/g, " ").trim();
      rows.push({ ym: d.ym, day: d.day, label: label || "利用", amount: amt });
    }
  }
  return rows;
}

/* ---------- 楽天ペイ / カード速報メール parser ---------- */
const STORE_LABEL_RE = /(?:ご利用店舗名?|ご利用店名|ご利用先|利用店舗|利用先|加盟店名?|店舗名|ショップ名)/;
/* 「ご利用店舗宛に直接ご連絡ください」等の定型文・案内文を店名として拾わないための除外 */
const STORE_BAD_RE = /宛|ご連絡|お問い合わせ|お問合せ|ください|下さい|直接|につきまして|に関しまして|下記|以下|こちら|詳細|確認|楽天ペイ|楽天カード|^[\s:：]*$/;
function pickStore(block) {
  const lines = block.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  const isAmountish = s => /^[¥￥]?[\d,，.\s]+円?$/.test(s);
  const isDateish = s => /20\d{2}[\/\-年]/.test(s);
  for (let i = 0; i < lines.length; i++) {
    const m = lines[i].match(new RegExp(STORE_LABEL_RE.source + "[\\s:：]*(.*)$"));
    if (!m) continue;
    const cand = (m[1] || "").trim();
    if (cand && !STORE_BAD_RE.test(cand) && !isAmountish(cand) && !isDateish(cand)) return cand.slice(0, 40);
    if (!cand) {
      /* ラベルと値が別の行に分かれているメール形式（HTMLテーブル等）に対応 */
      const nl = lines[i + 1];
      if (nl && !STORE_BAD_RE.test(nl) && !STORE_LABEL_RE.test(nl) && !isAmountish(nl) && !isDateish(nl) &&
          !/^(ご利用|決済|お支払|支払|ポイント|合計|注文|伝票|承認)/.test(nl)) return nl.slice(0, 40);
    }
  }
  return null;
}
function parseRakutenMail(text) {
  /* 楽天ペイのメールは「▼ご利用店舗 → ▼ご利用日時 → ▼決済総額」の順のため、
     取引ブロックより先にメールの先頭マーカーで区切り、店名はメール全体からも探す */
  const units = text.split(/(?=楽天ペイお支払い完了のお知らせ|いつも楽天ペイアプリをご利用|ご利用内容確認メール|カード利用のお知らせ)/).filter(u => u.trim());
  const rows = [];
  for (const unit of (units.length ? units : [text])) {
    const mailFallback = /カード利用のお知らせ/.test(unit) ? "楽天カード利用" : "楽天ペイ利用";
    const unitStore = pickStore(unit);
    const blocks = unit.split(/(?=ご利用日時|ご利用日[^時])/).filter(b => b.trim());
    for (const b of blocks) {
      /* 決済通知らしさの確認：広告メール等を明細と誤認しない */
      if (!/ご利用日時|ご利用日|カード利用|ご利用内容/.test(b)) continue;
      const d = parseDateStr(b);
      if (!d) continue;
      /* 金額は「決済総額」等のラベル付きのみ採用（広告内の商品価格を拾わないため、裸の¥金額は不採用） */
      const am = b.match(/(?:決済総額|お支払い?金額|ご利用金額|合計金額|利用金額)\s*[:：]?\s*[¥￥]?\s*([\d,]+)\s*円?/);
      if (!am) continue;
      const amt = Number(am[1].replace(/,/g, ""));
      if (!amt) continue;
      const store = pickStore(b) || unitStore;
      rows.push({ ym: d.ym, day: d.day, label: store || mailFallback, amount: amt });
    }
  }
  return rows;
}
const MAIL_FALLBACK_LABELS = ["楽天ペイ利用", "楽天カード利用"];

/* ---------- payslip parser ---------- */
function parsePayslip(text) {
  const items = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    const m = line.match(/^\s*([^\d¥￥]{1,20}?)[\s:：]*[¥￥]?\s*(-?[\d,]{2,})\s*円?\s*$/);
    if (m) {
      const label = m[1].trim();
      const amount = Number(m[2].replace(/,/g, ""));
      if (label && !isNaN(amount) && Math.abs(amount) < 100000000) items.push({ label, amount });
    }
  }
  const find = re => { const it = [...items].reverse().find(x => re.test(x.label)); return it ? it.amount : null; };
  const net = find(/振込額|差引支給|手取/);
  const gross = find(/支給額計|総支給|支給合計/);
  const ded = find(/控除合計|控除計/);
  let suggest = net ?? (gross != null && ded != null ? gross - ded : gross);
  state.psParsed = { items, net: suggest, gross, ded };
  renderPsResult();
}

  const p = state.psParsed;
  if (!p) return;
  $("#psResult").innerHTML = `
    <div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">

        <button class="btn" id="psApply">この金額を収入に登録</button>
      </div>
      ${p.gross != null || p.ded != null ? `<div class="note" style="margin-top:6px">支給額計 ${p.gross != null ? yen(p.gross) : "—"} ／ 控除合計 ${p.ded != null ? yen(p.ded) : "—"}</div>` : ""}
      ${p.items.length ? `<details class="pslip" style="margin-top:8px"><summary>読み取った全${p.items.length}項目を確認</summary><table>${p.items.map(it => `<tr><td>${esc(it.label)}</td><td class="num" style="text-align:right">${yen(it.amount)}</td></tr>`).join("")}</table></details>` : '<div class="empty">項目を読み取れませんでした。「項目名 金額」の形で1行ずつになっているか確認してください。</div>'}

  $("#psApply").onclick = () => {

    state.cur = ym; state.view = "home"; state.psParsed = null;

function renderAnalysis() {
  const all = sortedYMs();
  if (!all.length) { $("#view").innerHTML = '<div class="card"><div class="empty">データがありません</div></div>'; return; }
  const n = state.range === 0 ? all.length : state.range;
  const yms = all.slice(-n);
  state.rangeStart = yms[0];
  const T = yms.map(ym => ({ ym, ...totals(ym) }));
  const assetPts = yms.map(ym => {
    const m = DB.months[ym];
    return { ym, v: m && m.assets && m.assets.length ? assetTotal(m.assets) : null };
  }).filter(p => p.v != null);

/* ---- chart helpers ---- */
const CH = { w: 720, h: 250, pl: 52, pr: 10, pt: 14, pb: 26 };
function niceMax(v) {
  if (v <= 0) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  for (const m of [1, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10]) if (m * p >= v) return m * p;
  return 10 * p;
}
function axisFmt(v) { return v >= 10000 ? (v / 10000).toLocaleString("ja-JP") + "万" : v.toLocaleString("ja-JP"); }
function gridLines(max, y) {
  let out = "";
  for (let i = 0; i <= 4; i++) {
    const v = max / 4 * i, yy = y(v);
    out += `<line x1="${CH.pl}" x2="${CH.w - CH.pr}" y1="${yy}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>
      <text x="${CH.pl - 6}" y="${yy + 3.5}" text-anchor="end" style="font-size:10px;fill:var(--muted)" class="num">${axisFmt(v)}</text>`;
  }
  return out;
}
function barChart(T) {
  const { w, h, pl, pr, pt, pb } = CH;
  const iw = w - pl - pr, ih = h - pt - pb;
  const max = niceMax(Math.max(...T.map(t => Math.max(t.inc, t.exp)), 1));
  const y = v => pt + ih - v / max * ih;
  const bwPair = iw / T.length;
  const bw = Math.min(16, Math.max(3, bwPair * 0.32));
  let bars = "", hits = "", labels = "";
  T.forEach((t, i) => {
    const cx = pl + bwPair * (i + 0.5);
    const rr = Math.min(4, bw / 2);
    const bar = (v, color, off) => {
      const yy = y(v), hh = pt + ih - yy;
      if (hh <= 0) return "";
      return `<path d="M ${cx + off} ${pt + ih} L ${cx + off} ${yy + rr} Q ${cx + off} ${yy} ${cx + off + rr} ${yy} L ${cx + off + bw - rr} ${yy} Q ${cx + off + bw} ${yy} ${cx + off + bw} ${yy + rr} L ${cx + off + bw} ${pt + ih} Z" fill="${color}"/>`;
    };
    bars += bar(t.inc, "var(--inc)", -bw - 1) + bar(t.exp, "var(--exp)", 1);
    const showLab = T.length <= 13 || i % Math.ceil(T.length / 12) === 0;
    if (showLab) labels += `<text x="${cx}" y="${h - 8}" text-anchor="middle" style="font-size:9.5px;fill:var(--muted)">${ymShort(t.ym)}</text>`;
    hits += `<rect x="${pl + bwPair * i}" y="${pt}" width="${bwPair}" height="${ih}" fill="transparent" class="hit"
      data-tip="${esc(`<b>${ymLabel(t.ym)}</b><br>収入 ${yen(t.inc)}<br>支出 ${yen(t.exp)}<br>残金 ${yenS(t.bal)}`)}"/>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="月別の収入と支出">
    ${gridLines(max, y)}
    <line x1="${pl}" x2="${w - pr}" y1="${pt + ih}" y2="${pt + ih}" stroke="var(--axis)" stroke-width="1"/>
    ${bars}${labels}${hits}</svg>`;
}
function areaChart(pts) {
  const { w, h, pl, pr, pt, pb } = CH;
  const iw = w - pl - pr, ih = h - pt - pb;
  const max = niceMax(Math.max(...pts.map(p => p.v), 1));
  const y = v => pt + ih - v / max * ih;
  const x = i => pts.length === 1 ? pl + iw / 2 : pl + iw * i / (pts.length - 1);
  const line = pts.map((p, i) => (i ? "L" : "M") + x(i).toFixed(1) + " " + y(p.v).toFixed(1)).join(" ");
  const area = line + ` L ${x(pts.length - 1).toFixed(1)} ${pt + ih} L ${x(0).toFixed(1)} ${pt + ih} Z`;
  const last = pts[pts.length - 1];
  let labels = "", hits = "";
  pts.forEach((p, i) => {
    const show = pts.length <= 13 || i % Math.ceil(pts.length / 12) === 0;
    if (show) labels += `<text x="${x(i)}" y="${h - 8}" text-anchor="middle" style="font-size:9.5px;fill:var(--muted)">${ymShort(p.ym)}</text>`;
    const hw = pts.length === 1 ? iw : iw / (pts.length - 1);
    hits += `<rect x="${x(i) - hw / 2}" y="${pt}" width="${hw}" height="${ih}" fill="transparent" class="hit" data-tip="${esc(`<b>${ymLabel(p.ym)}</b><br>資産合計 ${yen(p.v)}`)}"/>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="資産合計の推移">
    ${gridLines(max, y)}
    <path d="${area}" fill="var(--asset)" opacity="0.14"/>
    <path d="${line}" fill="none" stroke="var(--asset)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(pts.length - 1)}" cy="${y(last.v)}" r="4.5" fill="var(--asset)" stroke="var(--chart-surface)" stroke-width="2"/>
    <text x="${Math.min(x(pts.length - 1), w - pr - 4)}" y="${Math.max(y(last.v) - 10, pt + 10)}" text-anchor="end" style="font-size:11px;font-weight:700;fill:var(--ink)" class="num">${yen(last.v)}</text>
    <line x1="${pl}" x2="${w - pr}" y1="${pt + ih}" y2="${pt + ih}" stroke="var(--axis)" stroke-width="1"/>
    ${labels}${hits}</svg>`;
}
function stackChart(yms, topCats) {
  const { w, h, pl, pr, pt, pb } = CH;
  const iw = w - pl - pr, ih = h - pt - pb;
  const data = yms.map(ym => {
    const per = {}; let other = 0, tot = 0;
    (DB.months[ym]?.expenses || []).forEach(e => {
      if (e.cat === "legacy") return;
      tot += e.amount;
      if (topCats.includes(e.cat)) per[e.cat] = (per[e.cat] || 0) + e.amount;
      else other += e.amount;
    });
    return { ym, per, other, tot };
  });
  const max = niceMax(Math.max(...data.map(d => d.tot), 1));
  const y = v => pt + ih - v / max * ih;
  const bwSlot = iw / yms.length;
  const bw = Math.min(34, bwSlot * 0.6);
  let bars = "", labels = "", hits = "";
  data.forEach((d, i) => {
    const x0 = pl + bwSlot * (i + 0.5) - bw / 2;
    let acc = 0;
    const seg = (v, color) => {
      if (!v) return "";
      const y1 = y(acc + v), y0 = y(acc);
      acc += v;
      return `<rect x="${x0}" y="${y1}" width="${bw}" height="${Math.max(0, y0 - y1 - 1)}" rx="1.5" fill="${color}"/>`;
    };
    topCats.forEach(id => { bars += seg(d.per[id] || 0, catById(id).color); });
    bars += seg(d.other, "#898781");
    const show = yms.length <= 13 || i % Math.ceil(yms.length / 12) === 0;
    if (show) labels += `<text x="${x0 + bw / 2}" y="${h - 8}" text-anchor="middle" style="font-size:9.5px;fill:var(--muted)">${ymShort(d.ym)}</text>`;
    const tipRows = topCats.filter(id => d.per[id]).map(id => `${esc(catById(id).name)} ${yen(d.per[id])}`).join("<br>");
    hits += `<rect x="${pl + bwSlot * i}" y="${pt}" width="${bwSlot}" height="${ih}" fill="transparent" class="hit"
      data-tip="${esc(`<b>${ymLabel(d.ym)}</b><br>${tipRows}${d.other ? "<br>その他 " + yen(d.other) : ""}${d.tot ? "<br><b>計 " + yen(d.tot) + "</b>" : "記録なし"}`)}"/>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="カテゴリ別支出の推移">
    ${gridLines(max, y)}
    <line x1="${pl}" x2="${w - pr}" y1="${pt + ih}" y2="${pt + ih}" stroke="var(--axis)" stroke-width="1"/>
    ${bars}${labels}${hits}</svg>`;
}
function wireTips() {
  const tip = $("#tooltip");
  $$(".hit").forEach(el => {
    const show = ev => {
      tip.innerHTML = el.dataset.tip;
      tip.style.display = "block";
      const px = ev.touches ? ev.touches[0].clientX : ev.clientX;
      const py = ev.touches ? ev.touches[0].clientY : ev.clientY;
      const r = tip.getBoundingClientRect();
      tip.style.left = Math.min(px + 12, window.innerWidth - r.width - 8) + "px";
      tip.style.top = Math.max(8, py - r.height - 12) + "px";
    };
    el.addEventListener("mousemove", show);
    el.addEventListener("touchstart", show, { passive: true });
    el.addEventListener("mouseleave", () => tip.style.display = "none");
    el.addEventListener("touchend", () => setTimeout(() => tip.style.display = "none", 1500), { passive: true });
  });
}

  $$(".delRule").forEach(b => b.onclick = () => { s.rules.splice(Number(b.dataset.i), 1); save(); renderSettings(); });

  $("#expJson").onclick = async () => {
    const data = JSON.stringify(DB, null, 1);
    const fn = "kakeibo-backup-" + new Date().toISOString().slice(0, 10).replaceAll("-", "") + ".json";
    if (window.claude && window.claude.downloads) {
      try { await window.claude.downloads.save({ filename: fn, data }); toast("バックアップを保存しました"); return; }
      catch (err) { if (err && err.code === "declined") return; }
    }
    const box = $("#jsonBox"); box.style.display = "block"; box.value = data; box.select();
    try { document.execCommand("copy"); toast("クリップボードにコピーしました"); } catch (e) { toast("表示されたテキストをコピーして保存してください"); }
  };
  $("#impJson").onchange = async e => {
    const f = e.target.files[0]; if (!f) return;
    try {
      const obj = JSON.parse(await f.text());
      if (!obj || !obj.months || !obj.settings) throw new Error("bad");
      if (!confirm("現在のデータを読み込んだ内容で置き換えます。よろしいですか？")) return;
      DB = obj; save(); toast("データを読み込みました"); render();
    } catch (err) { toast("ファイルを読み込めませんでした"); }
  };
  $("#resetAll").onclick = () => {
    if (!confirm("すべてのデータを削除します。よろしいですか？")) return;
    if (!confirm("本当に削除しますか？（バックアップを取ることをおすすめします）")) return;
    localStorage.removeItem(LS_KEY); DB = seedData(); save(); toast("初期化しました"); render();
  };
}

/* ============================================================ render root ============================================================ */
function render() {
  renderNav();
  renderMonthbar();
  if (state.view === "home") renderHome();
  else if (state.view === "import") renderImport();
  else if (state.view === "analysis") renderAnalysis();
  else renderSettings();
}
load();
render();
if (loadFirebaseConfig() && !inArtifact) fbInit();
</script>
